<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" fill="none">
  <defs>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Icon (compact version) -->
  <rect width="48" height="48" rx="12" x="4" y="4" fill="#0f1d15"/>

  <!-- D shape -->
  <path d="M18 16 L18 40 L26 40 C34 40, 40 34, 40 28 C40 22, 34 16, 26 16 Z" fill="none" stroke="url(#logo-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stethoscope circle -->
  <circle cx="37" cy="22" r="3.5" fill="none" stroke="#4ade80" stroke-width="1.2"/>
  <circle cx="37" cy="22" r="1.2" fill="#4ade80"/>

  <!-- Leaf -->
  <path d="M30 16 C32 12, 36 10, 40 9.5 C37 13, 34 15, 31 15.5" fill="#22c55e" opacity="0.9"/>

  <!-- Pulse -->
