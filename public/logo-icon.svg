<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111a14"/>
      <stop offset="100%" stop-color="#0a1f10"/>
    </linearGradient>
    <linearGradient id="leaf" x1="220" y1="80" x2="320" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4a86c"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Clean rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Single elegant leaf — the brand mark -->
  <path d="M256 96 C200 160, 160 240, 196 320 C212 356, 234 370, 256 360 C278 370, 300 356, 316 320 C352 240, 312 160, 256 96Z" fill="url(#leaf)"/>

  <!-- Minimal center vein -->
  <line x1="256" y1="130" x2="256" y2="350" stroke="#111a14" stroke-width="2" stroke-opacity="0.25"/>

  <!-- Thin elegant stem -->
  <line x1="256" y1="360" x2="256" y2="420" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-opacity="0.7"/>
</svg>
