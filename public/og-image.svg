  </text>

  <!-- Trust pills -->
  <g transform="translate(220, 400)">
    <rect x="0" y="0" width="150" height="32" rx="16" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="75" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6ee7b7">PubMed Verified</text>

    <rect x="170" y="0" width="150" height="32" rx="16" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="245" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6ee7b7">166+ Health Tools</text>

    <rect x="340" y="0" width="150" height="32" rx="16" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="415" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6ee7b7">FHIR Compatible</text>

    <rect x="510" y="0" width="170" height="32" rx="16" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="595" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6ee7b7">Powered by Claude AI</text>
  </g>

  <!-- URL -->
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="500" font-size="16" fill="#059669" opacity="0.5">
    doctopal.com
