<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- Subtle grid -->
  <pattern id="og-grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <line x1="40" y1="0" x2="40" y2="40" stroke="#059669" stroke-width="0.3" opacity="0.07"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#059669" stroke-width="0.3" opacity="0.07"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#og-grid)"/>

  <!-- Logo icon (centered, large) -->
  <g transform="translate(556, 120)">
    <circle cx="44" cy="44" r="30" stroke="#34d399" stroke-width="3.5" fill="none"/>
    <path d="M44 74 L44 82" stroke="#34d399" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="44" cy="85" r="3" fill="#34d399"/>
    <path d="M44 28 C38 34, 35 41, 39 47 C41 50, 44 50, 44 50 C44 50, 47 50, 49 47 C53 41, 50 34, 44 28Z" fill="#34d399" opacity="0.9"/>
  </g>

  <!-- Wordmark -->
